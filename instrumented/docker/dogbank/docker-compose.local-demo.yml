services:
  frontend:
    build:
      context: ../dogbank-mobile-app
      dockerfile: Dockerfile
    healthcheck: !override
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  postgres:
    ports: !reset []

  redis:
    ports: !reset []

  kafka:
    ports: !reset []

  rabbitmq:
    ports: !reset []

  datadog-agent:
    ports: !reset []
    volumes: !override
      - ./datadog/conf.d/postgres.d/conf.yaml:/etc/datadog-agent/conf.d/postgres.d/conf.yaml:ro
      - ./datadog/conf.d/kafka.d/conf.yaml:/etc/datadog-agent/conf.d/kafka.d/conf.yaml:ro
      - ./datadog/conf.d/rabbitmq.d/conf.yaml:/etc/datadog-agent/conf.d/rabbitmq.d/conf.yaml:ro

  spi-mock-service:
    depends_on: !reset []

  bancocentral-service:
    depends_on: !reset []

  auth-service:
    depends_on: !reset []

  account-service:
    depends_on: !reset []

  transaction-service:
    depends_on: !reset []

  chatbot-service:
    depends_on: !reset []

  ollama:
    profiles:
      - full-demo
    ports: !reset []

  pix-worker:
    profiles:
      - full-demo

  fraud-detection-service:
    profiles:
      - full-demo

  load-generator:
    profiles:
      - local-demo
    build:
      context: ./load-generator
      dockerfile: Dockerfile
    environment:
      RUN_MODE: pix_cron
      STARTUP_DELAY: "10"
      DOGBANK_LOAD_RUN_ID: "${DOGBANK_LOAD_RUN_ID:-local-demo}"
      MIN_INTERVAL: "${DOGBANK_LOAD_MIN_INTERVAL:-2}"
      MAX_INTERVAL: "${DOGBANK_LOAD_MAX_INTERVAL:-6}"
      MAX_TRANSACTIONS: "${DOGBANK_LOAD_MAX_TRANSACTIONS:-0}"
      DOGBANK_LOAD_FORCE_COVERAGE: "${DOGBANK_LOAD_FORCE_COVERAGE:-1}"
      BURST_COUNT: "${DOGBANK_LOAD_BURST_COUNT:-50}"
      BURST_INTERVAL: "${DOGBANK_LOAD_BURST_INTERVAL:-0.35}"
      REQUEST_TIMEOUT: "45"
      AUTH_SERVICE_URL: http://auth-service:8088
      TRANSACTION_SERVICE_URL: http://transaction-service:8084
      ACCOUNT_SERVICE_URL: http://account-service:8089
      CHATBOT_SERVICE_URL: http://chatbot-service:8083
      NGINX_URL: http://nginx:80
      PROB_SUCCESS: "0.35"
      PROB_INVALID_PIX_KEY: "0.15"
      PROB_INSUFFICIENT_BALANCE: "0.10"
      PROB_SELF_TRANSFER: "0.08"
      PROB_BC_TIMEOUT: "0.08"
      PROB_BC_INTERNAL_ERROR: "0.05"
      PROB_LIMIT_EXCEEDED: "0.07"
      PROB_SPI_TIMEOUT: "0.05"
      PROB_SPI_INTERNAL_ERROR: "0.04"
      PROB_SPI_LIMIT_EXCEEDED: "0.03"

  nginx:
    healthcheck: !override
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports: !override
      - "8080:80"
