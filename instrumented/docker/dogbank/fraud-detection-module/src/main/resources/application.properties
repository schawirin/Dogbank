# Server
server.port=8091

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
spring.kafka.consumer.group-id=${KAFKA_GROUP_ID:fraud-detection-group}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.properties.max.poll.records=10

# Topics
kafka.topics.transactions=pix-transactions
kafka.topics.fraud-events=fraud-events
kafka.topics.notification-dispatch=notification-dispatch
kafka.topics.audit-log=audit-log

# Redis (velocity checks + dedup)
redis.host=${REDIS_HOST:redis}
redis.port=${REDIS_PORT:6379}

# Actuator
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always

# Metrics - Datadog StatsD
management.statsd.metrics.export.enabled=true
management.statsd.metrics.export.host=${DD_AGENT_HOST:datadog-agent}
management.statsd.metrics.export.port=8125

# Logging
logging.level.com.dogbank.fraud=INFO
logging.level.org.springframework.kafka=INFO
logging.level.org.apache.kafka=WARN
logging.level.io.lettuce=WARN
logging.level.io.micrometer=ERROR
