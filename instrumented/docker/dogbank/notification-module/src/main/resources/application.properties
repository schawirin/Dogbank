server.port=8083
spring.application.name=notification-service
spring.main.banner-mode=off

# Database (optional - kept for potential future persistence)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/dogbank}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:dogbank}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:dog1234}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
spring.kafka.consumer.group-id=notification-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false

# Topics
kafka.topics.notification-dispatch=notification-dispatch

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Metrics - Datadog StatsD
management.statsd.metrics.export.enabled=true
management.statsd.metrics.export.host=${DD_AGENT_HOST:datadog-agent}
management.statsd.metrics.export.port=8125

# Logging
logging.config=classpath:log4j2.xml
logging.level.com.dogbank.notification=INFO
logging.level.org.springframework.kafka=INFO
logging.level.org.apache.kafka=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
