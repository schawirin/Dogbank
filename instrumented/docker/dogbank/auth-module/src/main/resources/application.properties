server.port=8088
spring.application.name=auth-service
spring.main.banner-mode=off

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/dogbank}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:dogbank}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:dog1234}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}

# Topics
kafka.topics.auth-events=auth-events
kafka.topics.audit-log=audit-log
kafka.topics.notification-dispatch=notification-dispatch

# Redis (rate limiting)
# K8s injeta REDIS_PORT=tcp://... como URL completa — usar SPRING_DATA_REDIS_* em vez disso
spring.redis.host=${SPRING_DATA_REDIS_HOST:redis}
spring.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# Admin token
dogbank.admin.block-token=${ADMIN_BLOCK_TOKEN:changeme-block-token}

# Log4j2 configuration
logging.config=classpath:log4j2.xml
logging.level.com.dogbank=INFO
logging.level.org.springframework.kafka=WARN
logging.level.org.apache.kafka=WARN
logging.level.io.lettuce=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
