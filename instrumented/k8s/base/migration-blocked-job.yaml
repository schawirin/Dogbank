# =============================================================================
# DogBank - DB Migration Job (idempotente)
# =============================================================================
# Adiciona a coluna `blocked` na tabela `usuarios` no RDS PostgreSQL.
# Usada pelo workflow Datadog "Account Takeover Response" para bloquear usuarios
# comprometidos via POST /api/auth/admin/block-user.
#
# Idempotente (ALTER TABLE ... ADD COLUMN IF NOT EXISTS).
# O pipeline executa `kubectl delete job` antes de aplicar este arquivo,
# pois Jobs sao imutaveis e nao podem ser reaplicados sem recriacao.
# =============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: migration-blocked-column
  namespace: dogbank
  labels:
    app: dogbank-migration
    component: db-migration
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: dogbank-migration
        component: db-migration
    spec:
      restartPolicy: OnFailure
      containers:
        - name: psql
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - |
              set -e
              echo "[migration] Conectando em $POSTGRES_HOST:$POSTGRES_PORT/$POSTGRES_DB como $POSTGRES_USER..."
              psql -h "$POSTGRES_HOST" -p "$POSTGRES_PORT" -U "$POSTGRES_USER" -d "$POSTGRES_DB" \
                -v ON_ERROR_STOP=1 \
                -c "ALTER TABLE usuarios ADD COLUMN IF NOT EXISTS blocked BOOLEAN NOT NULL DEFAULT false;" \
                -c "CREATE INDEX IF NOT EXISTS idx_usuarios_blocked ON usuarios(blocked) WHERE blocked = true;" \
                -c "SELECT 'Migration ok. Usuarios bloqueados: ' || COUNT(*) FROM usuarios WHERE blocked = true;"
              echo "[migration] Concluida com sucesso."
          env:
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: dogbank-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: dogbank-config
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: dogbank-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: dogbank-config
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: dogbank-secrets
                  key: SPRING_DATASOURCE_PASSWORD
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
