apiVersion: batch/v1
kind: Job
metadata:
  name: reset-passwords
  namespace: dogbank
  labels:
    app: reset-passwords
spec:
  ttlSecondsAfterFinished: 120
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: reset
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - |
              psql postgresql://dogbank:dog1234@postgres:5432/dogbank -c "
                UPDATE usuarios SET senha = '123456'
                WHERE cpf IN (
                  '12345678915','98765432101','45678912302','78912345603','32165498704',
                  '65498732105','15975385206','66666666666','11122233344','55566677788'
                );
                SELECT id, cpf, nome, senha FROM usuarios ORDER BY id;
              "
