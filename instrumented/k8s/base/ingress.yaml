# =============================================================================
# DogBank - Ingress Resource (lab.dogbank.dog with TLS)
# Mirrors ingress-tls.yaml — kept for kustomization compatibility
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dogbank-ingress
  namespace: dogbank
  labels:
    app: dogbank
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-protocols: "TLSv1.2 TLSv1.3"
    nginx.ingress.kubernetes.io/ssl-ciphers: "HIGH:!aNULL:!MD5"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
spec:
  tls:
  - hosts:
    - lab.dogbank.dog
    secretName: dogbank-tls-cert
  rules:
    - host: lab.dogbank.dog
      http:
        paths:
          # Frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          # Auth Service
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 8088
          # Account Service
          - path: /api/accounts
            pathType: Prefix
            backend:
              service:
                name: account-service
                port:
                  number: 8089
          # Transaction Service
          - path: /api/transactions
            pathType: Prefix
            backend:
              service:
                name: transaction-service
                port:
                  number: 8084
          # Banco Central Service
          - path: /api/bancocentral
            pathType: Prefix
            backend:
              service:
                name: bancocentral-service
                port:
                  number: 8085
          # Chatbot Service
          - path: /api/chatbot
            pathType: Prefix
            backend:
              service:
                name: chatbot-service
                port:
                  number: 8083
