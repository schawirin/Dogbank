name: docker-publish
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: auth
            context: ./instrumented/docker/dogbank
            dockerfile: ./instrumented/docker/dogbank/auth-module/Dockerfile
            image: schawirin/dogbank-auth-service
          - name: account
            context: ./instrumented/docker/dogbank
            dockerfile: ./instrumented/docker/dogbank/account-module/Dockerfile
            image: schawirin/dogbank-account-service
          - name: transactions
            context: ./instrumented/docker/dogbank
            dockerfile: ./instrumented/docker/dogbank/transaction-module/Dockerfile
            image: schawirin/dogbank-transaction-service
          - name: bancocentral
            context: ./instrumented/docker/dogbank
            dockerfile: ./instrumented/docker/dogbank/bancocentral-module/Dockerfile
            image: schawirin/dogbank-bancocentral-service
          - name: fraud-detection
            context: ./instrumented/docker/dogbank
            dockerfile: ./instrumented/docker/dogbank/fraud-detection-module/Dockerfile
            image: schawirin/dogbank-fraud-detection-service
          - name: pix-worker
            context: ./instrumented/docker/dogbank
            dockerfile: ./instrumented/docker/dogbank/pix-worker-module/Dockerfile
            image: schawirin/dogbank-pix-worker
          - name: chatbot
            context: ./instrumented/docker/dogbank/chatbot-python
            dockerfile: ./instrumented/docker/dogbank/chatbot-python/Dockerfile
            image: schawirin/dogbank-chatbot-service
          - name: cache-sync-service
            context: ./instrumented/docker/dogbank/cache-sync-service
            dockerfile: ./instrumented/docker/dogbank/cache-sync-service/Dockerfile
            image: schawirin/dogbank-cache-sync-service
          - name: load-generator
            context: ./instrumented/docker/dogbank/load-generator
            dockerfile: ./instrumented/docker/dogbank/load-generator/Dockerfile
            image: schawirin/dogbank-load-generator

    steps:
      - uses: actions/checkout@v4
      
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Compute tags
        id: vars
        run: |
          SHA="${GITHUB_SHA::7}"
          echo "sha=${SHA}" >> $GITHUB_OUTPUT
      
      - name: Build & Push ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: |
            ${{ matrix.service.image }}:latest
            ${{ matrix.service.image }}:${{ steps.vars.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-eks:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: success()

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubectl for EKS
        run: |
          aws eks update-kubeconfig --name eks-sandbox-datadog --region us-east-1

      - name: Apply K8s manifests (configmap + deployments + services)
        run: |
          echo "📦 Aplicando manifests do namespace dogbank..."

          # Garante namespace e configmap antes (outras refs dependem deles)
          kubectl apply -f instrumented/k8s/base/namespace.yaml
          kubectl apply -f instrumented/k8s/base/configmap.yaml

          # Aplica todo o resto exceto:
          # - secrets.yaml: criado manualmente via secrets.local.sh (contem placeholders)
          # - kustomization.yaml: nao e um recurso
          # - migration-blocked-job.yaml: Jobs sao imutaveis, tratado em step separado
          # - *.bak: backups
          find instrumented/k8s/base/ -maxdepth 1 -name '*.yaml' \
            ! -name 'namespace.yaml' \
            ! -name 'configmap.yaml' \
            ! -name 'secrets.yaml' \
            ! -name 'kustomization.yaml' \
            ! -name 'migration-blocked-job.yaml' \
            -exec kubectl apply -f {} \;

          echo "✅ Manifests aplicados"

      - name: Run DB migration (idempotent ALTER TABLE blocked)
        run: |
          echo "🗄️  Rodando migration: adicionar coluna 'blocked' em usuarios..."
          # Jobs sao imutaveis -> delete antes do apply garante re-execucao a cada deploy
          kubectl delete job migration-blocked-column -n dogbank --ignore-not-found
          kubectl apply -f instrumented/k8s/base/migration-blocked-job.yaml
          # Espera ate completar (max 2min)
          if ! kubectl wait --for=condition=complete job/migration-blocked-column -n dogbank --timeout=2m; then
            echo "❌ Migration falhou. Logs:"
            kubectl logs job/migration-blocked-column -n dogbank --tail=100 || true
            exit 1
          fi
          echo "📋 Logs da migration:"
          kubectl logs job/migration-blocked-column -n dogbank --tail=50

      - name: Rollout restart deployments
        run: |
          echo "🔄 Restarting deployments to pull latest images..."

          # Restart all backend services in dogbank namespace
          kubectl rollout restart deployment/auth-service -n dogbank || true
          kubectl rollout restart deployment/account-service -n dogbank || true
          kubectl rollout restart deployment/transaction-service -n dogbank || true
          kubectl rollout restart deployment/bancocentral-service -n dogbank || true
          kubectl rollout restart deployment/fraud-detection-service -n dogbank || true
          kubectl rollout restart deployment/pix-worker -n dogbank || true
          kubectl rollout restart deployment/chatbot-service -n dogbank || true

          # Restart frontend
          kubectl rollout restart deployment/frontend -n dogbank || true

          # Restart load-generator
          kubectl rollout restart deployment/load-generator -n dogbank || true

          echo "✅ All deployments restarted"

      - name: Wait for rollout to complete
        run: |
          echo "⏳ Waiting for rollouts to complete..."

          kubectl rollout status deployment/auth-service -n dogbank --timeout=5m || true
          kubectl rollout status deployment/account-service -n dogbank --timeout=5m || true
          kubectl rollout status deployment/transaction-service -n dogbank --timeout=5m || true
          kubectl rollout status deployment/bancocentral-service -n dogbank --timeout=5m || true
          kubectl rollout status deployment/fraud-detection-service -n dogbank --timeout=5m || true
          kubectl rollout status deployment/pix-worker -n dogbank --timeout=5m || true
          kubectl rollout status deployment/chatbot-service -n dogbank --timeout=5m || true
          kubectl rollout status deployment/frontend -n dogbank --timeout=5m || true
          kubectl rollout status deployment/load-generator -n dogbank --timeout=5m || true

          echo "✅ All deployments are ready!"

      - name: Verify pods
        run: |
          echo "📊 Current pod status:"
          kubectl get pods -n dogbank